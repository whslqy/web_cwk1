openapi: 3.0.3
info:
  title: Book API
  version: 1.0.0
  description: A coursework-ready Django REST API for managing and exploring books.
paths:
  /api/books/:
    get:
      operationId: books_list
      description: Returns all books and supports filtering, search, and ordering
        through query parameters.
      summary: List books
      parameters:
      - in: query
        name: genre
        schema:
          type: string
        description: Filter by exact genre, case-insensitive.
      - in: query
        name: bookid
        schema:
          type: integer
        description: Filter by the sequential coursework book ID.
      - in: query
        name: author
        schema:
          type: string
        description: Filter by author name containing the given text.
      - in: query
        name: published_year
        schema:
          type: integer
        description: Filter by exact publication year.
      - in: query
        name: search
        schema:
          type: string
        description: Search title, author, genre, and description.
      - in: query
        name: ordering
        schema:
          type: string
        description: Sort by bookid, title, author, published_year, average_rating,
          or ratings_count. Prefix with - for descending.
      - in: query
        name: language
        schema:
          type: string
        description: Filter by language code, for example en.
      - in: query
        name: min_rating
        schema:
          type: number
          format: double
        description: Filter by minimum average rating.
      tags:
      - books
      security:
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
              examples:
                FilteredListExample:
                  value:
                  - - id: 1
                      title: The Pragmatic Programmer
                      author: Andrew Hunt
                      genre: Technology
                      published_year: 1999
                      description: Classic software craftsmanship guidance.
                  summary: Filtered list example
          description: ''
    post:
      operationId: books_create
      description: Creates a new book record in the database.
      summary: Create a book
      tags:
      - books
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Book'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Book'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Book'
        required: true
      security:
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
          description: ''
  /api/books/{id}/:
    get:
      operationId: books_retrieve
      description: Returns one book by ID.
      summary: Retrieve a single book
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this book.
        required: true
      tags:
      - books
      security:
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
          description: ''
    put:
      operationId: books_update
      description: Replaces an existing book record.
      summary: Update a book
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this book.
        required: true
      tags:
      - books
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Book'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Book'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Book'
        required: true
      security:
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
          description: ''
    delete:
      operationId: books_destroy
      description: Removes a book from the database.
      summary: Delete a book
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this book.
        required: true
      tags:
      - books
      security:
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /api/books/by-bookid/{bookid}/:
    get:
      operationId: books_by_bookid_retrieve
      description: Returns one book using the sequential coursework bookid instead
        of the database primary key.
      summary: Retrieve a book by bookid
      parameters:
      - in: path
        name: bookid
        schema:
          type: integer
        description: Sequential coursework book ID.
        required: true
      tags:
      - books
      security:
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
          description: ''
  /api/books/recommendations/similar/:
    get:
      operationId: books_recommendations_similar_list
      description: Finds books similar to a seed book identified by bookid. The score
        uses weighted title, author, publisher, language, rating, and year signals,
        plus diversity penalties to reduce repeated authors and near-duplicate titles.
      summary: Recommend similar books
      parameters:
      - in: query
        name: bookid
        schema:
          type: integer
        description: Sequential coursework book ID of the seed book.
        required: true
      - in: query
        name: limit
        schema:
          type: integer
        description: Maximum number of similar books to return.
      tags:
      - books
      security:
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecommendationResult'
          description: ''
  /api/books/search/:
    get:
      operationId: books_search_list
      description: Searches books by title, author, publisher, language, and rating.
        Results are sorted by average rating first and ratings count second.
      summary: Search books
      parameters:
      - in: query
        name: title
        schema:
          type: string
          minLength: 1
        description: Optional title text filter.
      - in: query
        name: author
        schema:
          type: string
          minLength: 1
        description: Optional author text filter.
      - in: query
        name: publisher
        schema:
          type: string
          minLength: 1
        description: Optional publisher text filter.
      - in: query
        name: language
        schema:
          type: string
          minLength: 1
        description: Optional language code filter, for example eng or en-US.
      - in: query
        name: min_rating
        schema:
          type: number
          format: double
        description: Optional minimum average rating.
      - in: query
        name: limit
        schema:
          type: integer
        description: Maximum number of search results to return.
      tags:
      - books
      security:
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchResult'
          description: ''
  /api/books/stats/:
    get:
      operationId: books_stats_retrieve
      description: Returns aggregate statistics for the current book collection.
      summary: Book statistics
      tags:
      - books
      security:
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookStats'
          description: ''
components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        bookid:
          type: integer
          readOnly: true
          nullable: true
        title:
          type: string
          maxLength: 200
        author:
          type: string
          maxLength: 255
        genre:
          type: string
          maxLength: 100
        published_year:
          type: integer
        description:
          type: string
        pages:
          type: integer
          nullable: true
        publisher:
          type: string
          maxLength: 255
        language:
          type: string
          maxLength: 20
        average_rating:
          type: number
          format: double
          nullable: true
        ratings_count:
          type: integer
        thumbnail:
          type: string
          format: uri
          maxLength: 200
      required:
      - author
      - bookid
      - genre
      - id
      - published_year
      - title
    BookStats:
      type: object
      properties:
        total_books:
          type: integer
        average_published_year:
          type: number
          format: double
          nullable: true
        earliest_published_year:
          type: integer
          nullable: true
        latest_published_year:
          type: integer
          nullable: true
        genres:
          type: object
          additionalProperties:
            type: integer
      required:
      - average_published_year
      - earliest_published_year
      - genres
      - latest_published_year
      - total_books
    RecommendationResult:
      type: object
      properties:
        id:
          type: integer
        bookid:
          type: integer
          nullable: true
        title:
          type: string
        author:
          type: string
        genre:
          type: string
        publisher:
          type: string
        language:
          type: string
        published_year:
          type: integer
        average_rating:
          type: number
          format: double
          nullable: true
        ratings_count:
          type: integer
        similarity_score:
          type: number
          format: double
        reason:
          type: string
      required:
      - author
      - average_rating
      - bookid
      - genre
      - id
      - language
      - published_year
      - publisher
      - ratings_count
      - reason
      - similarity_score
      - title
    SearchResult:
      type: object
      properties:
        id:
          type: integer
        bookid:
          type: integer
          nullable: true
        title:
          type: string
        author:
          type: string
        genre:
          type: string
        published_year:
          type: integer
        average_rating:
          type: number
          format: double
          nullable: true
        ratings_count:
          type: integer
        match_summary:
          type: string
      required:
      - author
      - average_rating
      - bookid
      - genre
      - id
      - match_summary
      - published_year
      - ratings_count
      - title
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
